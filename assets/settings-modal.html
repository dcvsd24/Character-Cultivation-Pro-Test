<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脚本设置</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .modal-box {
            width: 1100px;
            max-height: 98vh;
            padding: 18px 22px;
            transform: translate(-80px, -5px);
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--gb-border);
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .all-zero-hint {
            font-size: 15px;
            color: var(--gb-warning);
            display: none;
        }

        .countdown-text {
            font-size: 14px;
            color: var(--gb-warning);
            text-align: right;
            white-space: nowrap;
        }

        .settings-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-height: calc(98vh - 130px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .setting-group {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--gb-border-strong);
            border-radius: var(--gb-radius-md);
            padding: 12px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: flex-end;
        }

        .wiki-weapon-input {
            display: none;
            margin-top: 4px;
            gap: 4px;
            flex-direction: column;
        }

        .wiki-weapon-input.show {
            display: flex;
        }

        .hint-text {
            color: var(--gb-warning);
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="gb-overlay">
        <div class="modal-box gb-glass gb-frame" id="modalBox">
            <div class="modal-header">
                <div class="title-row">
                    <div class="gb-title gb-gradient-text">⚙️ 脚本设置配置</div>
                    <span class="all-zero-hint" id="allZeroHint">角色材料已全部收集完成！请配置新的角色。</span>
                </div>
                <div class="title-row">
                    <span class="countdown-text" id="countdownText">30秒后自动关闭</span>
                    <button class="gb-btn gb-btn-secondary gb-btn-icon" id="cancelBtn">✕</button>
                </div>
            </div>

            <div class="settings-container gb-scroll">
                <!-- 必填设置 -->
                <div class="setting-group">
                    <div class="gb-group-title gb-gradient-text-gold">📌 必填设置</div>
                    <div class="setting-item">
                        <label class="gb-label gb-label-required">【角色名称】不要输错角色名称</label>
                        <input type="text" id="Character" class="gb-input" placeholder="请输入角色名称">
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">【战斗队伍】秘境和boss挑战前切换</label>
                        <input type="text" id="teamName" class="gb-input" placeholder="必填">
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">【采集队伍】采集时需要草神,水,雷,风元素等角色</label>
                        <input type="text" id="teamName2" class="gb-input" placeholder="必填">
                    </div>
                </div>

                <!-- 突破等级设置 -->
                <div class="setting-group">
                    <div class="gb-group-title gb-gradient-text-gold">📈 目标突破等级（你想要升到多少级）</div>
                    <div class="setting-item">
                        <label class="gb-label">角色突破目标等级（80级对应90级）</label>
                        <select id="bossRequireCounts" class="gb-select">
                            <option value="80级">80级</option>
                            <option value="70级">70级</option>
                            <option value="60级">60级</option>
                            <option value="50级">50级</option>
                            <option value="40级">40级</option>
                            <option value="20级">20级</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">武器突破目标等级（80级对应90级）</label>
                        <select id="weaponMaterialRequireCounts" class="gb-select">
                            <option value="80级">80级</option>
                            <option value="70级">70级</option>
                            <option value="60级">60级</option>
                            <option value="50级">50级</option>
                            <option value="40级">40级</option>
                            <option value="20级">20级</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">天赋等级(x-y-z，普攻-战技-大招)</label>
                        <input type="text" id="talentBookRequireCounts" class="gb-input" placeholder="1-10-10" value="1-10-10">
                    </div>
                </div>

                <!-- Wiki模式设置 -->
                <div class="setting-group">
                    <div class="gb-group-title gb-gradient-text-gold">🌐 Wiki模式</div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="enableWikiDataFetch">
                            <span>启用Wiki模式，从网页获取Boss、天赋怪物、区域特产、天赋书名称</span>
                        </label>
                    </div>
                    <div class="wiki-weapon-input" id="wikiWeaponInput">
                        <label class="gb-label">【武器名称】用于获取武器材料信息</label>
                        <input type="text" id="weaponName" class="gb-input" placeholder="请输入武器名称(请不要输错武器名称)">
                    </div>
                    <div class="setting-item">
                        <label class="hint-text">
                            💡 未获取角色时使用，默认背包材料为零，获取角色和武器升到90级需要的材料，如果已经获取了角色，请关闭。不关闭会一直获取 [不消耗树脂] 的角色材料。
                        </label>
                    </div>
                </div>

                <!-- 其他选项 -->
                <div class="setting-group">
                    <div class="gb-group-title gb-gradient-text-gold">🔧 其他选项</div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="isNoGrassGod">
                            <span>排除需要草神的线路，队伍内无草神时请勾选。</span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="energyMax">
                            <span>Boss挑战前恢复满大招能量</span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">战斗策略名称（为空则使用默认策略）</label>
                        <input type="text" id="strategyName" class="gb-input" placeholder="可选，如：四神队.txt">
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">地脉之花地区</label>
                        <select id="adventurePath" class="gb-select">
                            <option value="蒙德">蒙德</option>
                            <option value="璃月">璃月</option>
                            <option value="稻妻">稻妻</option>
                            <option value="枫丹">枫丹</option>
                            <option value="纳塔">纳塔</option>
                            <option value="挪德卡莱">挪德卡莱</option>
                        </select>
                    </div>
                </div>

                <!-- 功能设置 -->
                <div class="setting-group">
                    <div class="gb-group-title gb-gradient-text-gold">功能设置</div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="unfairContractTerms">
                            <span style="color: var(--gb-warning);">⚠️ 签署霸王条款开启使用，出了事跟作者无关</span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="checkVersionEnabled" checked>
                            <span>启用版本检查</span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="showSettingsOnStartup" checked>
                            <span>每次启动弹出设置弹窗</span>
                        </label>
                    </div>
                </div>

                <!-- UID遮挡 -->
                <div class="setting-group">
                    <div class="gb-group-title gb-gradient-text-gold">🔒 UID遮挡</div>
                    <div class="setting-item">
                        <label class="gb-checkbox">
                            <input type="checkbox" id="enableUidMask">
                            <span>启用左上角UID遮挡</span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">X坐标（距左边像素，数值增大向右移动默认31）</label>
                        <input type="text" id="uidMaskPositionX" class="gb-input" placeholder="31" value="31">
                    </div>
                    <div class="setting-item">
                        <label class="gb-label">Y坐标（距上边像素，数值增大向下移动默认117）</label>
                        <input type="text" id="uidMaskPositionY" class="gb-input" placeholder="117" value="117">
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="gb-btn gb-btn-secondary" id="cancelBtn2">取消</button>
                <button class="gb-btn gb-btn-primary" id="saveBtn">保存并运行</button>
            </div>
        </div>
    </div>

    <script>
        let countdown = 30;
        let countdownInterval = null;
        let isClosed = false;

        function toggleWikiWeaponInput() {
            const wikiCheckbox = document.getElementById('enableWikiDataFetch');
            const weaponInputDiv = document.getElementById('wikiWeaponInput');
            if (wikiCheckbox.checked) {
                weaponInputDiv.classList.add('show');
            } else {
                weaponInputDiv.classList.remove('show');
            }
        }

        function resetCountdown() {
            countdown = 30;
            document.getElementById('countdownText').textContent = countdown + '秒后自动关闭';
            if (window.htmlMask) {
                try {
                    window.htmlMask.request('/userActive', '{}');
                } catch (e) {
                    console.error('userActive 请求异常:', e);
                }
            }
        }

        function updateCountdown() {
            countdown--;
            document.getElementById('countdownText').textContent = countdown + '秒后自动关闭';
            if (countdown <= 0) {
                closeWindow('timeout');
            }
        }

        function closeWindow(action) {
            if (isClosed) return;
            isClosed = true;
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            if (window.htmlMask) {
                window.htmlMask.request('/close', JSON.stringify({ action: action }));
            }
        }

        function saveSettings() {
            const settings = {
                Character: document.getElementById('Character').value.trim(),
                bossRequireCounts: document.getElementById('bossRequireCounts').value,
                weaponMaterialRequireCounts: document.getElementById('weaponMaterialRequireCounts').value,
                talentBookRequireCounts: document.getElementById('talentBookRequireCounts').value.trim() || '1-10-10',
                teamName: document.getElementById('teamName').value.trim(),
                strategyName: document.getElementById('strategyName').value.trim(),
                teamName2: document.getElementById('teamName2').value.trim(),
                isNoGrassGod: document.getElementById('isNoGrassGod').checked,
                energyMax: document.getElementById('energyMax').checked,
                unfairContractTerms: document.getElementById('unfairContractTerms').checked,
                checkVersionEnabled: document.getElementById('checkVersionEnabled').checked,
                showSettingsOnStartup: document.getElementById('showSettingsOnStartup').checked,
                enableWikiDataFetch: document.getElementById('enableWikiDataFetch').checked,
                weaponName: document.getElementById('weaponName').value.trim(),
                adventurePath: document.getElementById('adventurePath').value,
                enableUidMask: document.getElementById('enableUidMask').checked,
                uidMaskPositionX: document.getElementById('uidMaskPositionX').value.trim() || '31',
                uidMaskPositionY: document.getElementById('uidMaskPositionY').value.trim() || '117'
            };

            if (window.htmlMask) {
                window.htmlMask.request('/save', JSON.stringify(settings));
            }
        }

        function initSettings(data) {
            try {
                const settings = typeof data === 'string' ? JSON.parse(data) : data;
                if (settings.Character) document.getElementById('Character').value = settings.Character;
                if (settings.bossRequireCounts) document.getElementById('bossRequireCounts').value = settings.bossRequireCounts;
                if (settings.weaponMaterialRequireCounts) document.getElementById('weaponMaterialRequireCounts').value = settings.weaponMaterialRequireCounts;
                document.getElementById('talentBookRequireCounts').value = settings.talentBookRequireCounts || '1-10-10';
                if (settings.teamName) document.getElementById('teamName').value = settings.teamName;
                if (settings.strategyName) document.getElementById('strategyName').value = settings.strategyName;
                if (settings.teamName2) document.getElementById('teamName2').value = settings.teamName2;
                document.getElementById('isNoGrassGod').checked = settings.isNoGrassGod || false;
                document.getElementById('energyMax').checked = settings.energyMax || false;
                document.getElementById('unfairContractTerms').checked = settings.unfairContractTerms || false;
                document.getElementById('checkVersionEnabled').checked = settings.checkVersionEnabled !== false;
                document.getElementById('showSettingsOnStartup').checked = settings.showSettingsOnStartup || false;
                document.getElementById('enableWikiDataFetch').checked = settings.enableWikiDataFetch || false;
                if (settings.weaponName) document.getElementById('weaponName').value = settings.weaponName;
                if (settings.adventurePath) document.getElementById('adventurePath').value = settings.adventurePath;
                document.getElementById('enableUidMask').checked = settings.enableUidMask || false;
                document.getElementById('uidMaskPositionX').value = settings.uidMaskPositionX || '31';
                document.getElementById('uidMaskPositionY').value = settings.uidMaskPositionY || '117';

                toggleWikiWeaponInput();

                if (settings.showAllZeroHint) {
                    const hintEl = document.getElementById('allZeroHint');
                    if (hintEl) {
                        hintEl.style.display = 'inline';
                        hintEl.classList.add('gb-pulse');
                    }
                }
            } catch (e) {
                console.error('初始化设置失败:', e);
            }
        }

        document.getElementById('cancelBtn').addEventListener('click', () => closeWindow('cancel'));
        document.getElementById('cancelBtn2').addEventListener('click', () => closeWindow('cancel'));
        document.getElementById('saveBtn').addEventListener('click', saveSettings);

        document.getElementById('enableWikiDataFetch').addEventListener('change', function() {
            toggleWikiWeaponInput();
            resetCountdown();
        });

        document.querySelectorAll('.gb-input, .gb-select').forEach(el => {
            el.addEventListener('focus', resetCountdown);
            el.addEventListener('change', resetCountdown);
            el.addEventListener('input', resetCountdown);
        });
        document.querySelectorAll('input[type="checkbox"]').forEach(el => {
            el.addEventListener('change', resetCountdown);
        });

        function init() {
            countdownInterval = setInterval(updateCountdown, 1000);

            if (window.htmlMask) {
                window.htmlMask.onMessage = function(msg) {
                    try {
                        const parsed = typeof msg === 'string' ? JSON.parse(msg) : msg;
                        if (parsed.url === '/initSettings') {
                            initSettings(parsed.data);
                        }
                    } catch (e) {
                        console.error('消息解析失败:', e);
                    }
                };
                try {
                    window.htmlMask.request('/ready', '{}');
                } catch (e) {
                    console.error('ready 请求异常:', e);
                }
            }
        }

        try {
            init();
        } catch (e) {
            console.error('初始化异常:', e);
        }
    </script>
</body>
</html>
